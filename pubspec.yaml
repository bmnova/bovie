name: bovie
description: "A new Flutter movie application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  mobx: ^2.3.0
  flutter_mobx: ^2.2.0
  
  # Network & API
  dio: ^5.4.1
  
  # Dependency Injection
  get_it: ^7.6.7
  
  # Routing
  go_router: ^13.2.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Helpers
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Environment
  flutter_dotenv: ^5.1.0
  
  # Localization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  mobx_codegen: ^2.5.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_gen_runner:
  intl_utils: ^2.8.7
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_gen:
  line_length: 150
  output: lib/generated/
  integrations:
    flutter_svg: true
  assets:
    outputs:
      class_name: BovieAssets
      package_parameter_enabled: false
flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated

flutter_native_splash:
  color: "#05051E" # AppColors.background (Bovie background)
  image: assets/images/clapperboard.png
  android: true
  ios: true
  fullscreen: true
