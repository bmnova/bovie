name: bovie
description: "A new Flutter movie application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  mobx: ^2.3.0
  flutter_mobx: ^2.2.0
  
  # Network & API
  dio: ^5.4.1
  
  # Dependency Injection
  get_it: ^7.6.7
  
  # Routing
  go_router: ^13.2.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Helpers
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  mobx_codegen: ^2.5.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
