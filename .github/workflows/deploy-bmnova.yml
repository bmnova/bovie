name: Deploy bmnova to Vercel

on:
  push:
    branches: [main]
    paths:
      - "websites/apps/bmnova/**"
      - "websites/packages/shared/**"
      - "websites/package.json"
      - "websites/pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: websites/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        working-directory: websites/apps/bmnova
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: websites
        run: pnpm install --frozen-lockfile && pnpm turbo build --filter=bmnova

      - name: Deploy to Vercel
        working-directory: websites/apps/bmnova
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
