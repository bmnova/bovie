name: Deploy intyx to Vercel

on:
  push:
    branches: [main]
    paths:
      - "websites/apps/intyx/**"
      - "websites/packages/shared/**"
      - "websites/package.json"
      - "websites/pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: websites/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Set Vercel env vars
        run: |
          echo "VERCEL_ORG_ID=$(echo '${{ secrets.VERCEL_ORG_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$(echo '${{ secrets.VERCEL_PROJECT_ID_INTYX }}' | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Pull Vercel project settings
        working-directory: websites/apps/intyx
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: websites/apps/intyx
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: websites/apps/intyx
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
